<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Descubre nuestros productos. Síguenos en redes.">
    <title>Tu Marca | Productos</title>

    <!-- Open Graph / Social -->
    <meta property="og:locale" content="es_LA">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Tu Marca">
    <meta property="og:description" content="Dos productos increíbles para ti.">
    <meta property="og:url" content="https://tudominio.com/">
    <meta property="og:image" content="https://tudominio.com/images/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Tu Marca">
    <meta name="twitter:description" content="Dos productos increíbles para ti.">
    <meta name="twitter:image" content="https://tudominio.com/images/og-image.jpg">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            overflow: hidden;
            position: fixed;
            top: 0; bottom: 0; left: 0; right: 0;
            background: black;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* PANTALLA DE CARGA MINIMALISTA (línea) */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .loading-bar-container {
            width: 180px;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: #66cddd;
            border-radius: 3px;
            transition: width 0.08s linear;
        }
        .loading-percentage-text {
            margin-top: 16px;
            font-size: 14px;
            font-weight: 400;
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.5px;
        }

        /* CAPA PRINCIPAL */
        #app-root {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* LOGO CENTRADO */
        .logo-center-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            padding: 0 20px;
        }
        #custom-logo {
            height: 177px;
            width: auto;
            max-width: 85vw;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
        }

        /* CONTENEDOR DE PRODUCTOS (reemplaza el carrusel) */
        .products-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;
            max-width: 700px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            padding: 0 16px;
        }

        /* CADA CARD DE PRODUCTO */
        .product-card {
            flex: 1 1 260px;
            max-width: 320px;
            min-width: 240px;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15), 0 2px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.2), 0 4px 10px rgba(0,0,0,0.1);
        }
        .product-card:active {
            transform: scale(0.98);
        }
        .product-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }
        .product-card .product-info {
            padding: 16px 18px 20px;
            text-align: center;
            background: #fff;
        }
        .product-card .product-name {
            font-size: 17px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 6px;
        }
        .product-card .product-price {
            font-size: 20px;
            font-weight: 700;
            color: #25D366;
        }

        /* REDES SOCIALES (sin botón WA) */
        .social-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 20px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            z-index: 50;
        }
        .social-icon {
            display: inline-block;
            width: 36px;
            height: 36px;
            transition: transform 0.2s;
            opacity: 0.85;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        .social-icon:hover {
            transform: scale(1.1);
            opacity: 1;
        }
        .social-icon svg {
            width: 100%;
            height: 100%;
            fill: white;
        }

        /* Ajustes responsive */
        @media (max-width: 600px) {
            .products-container {
                gap: 16px;
                width: 95vw;
            }
            .product-card {
                flex: 1 1 200px;
                min-width: 160px;
                max-width: 48%;
            }
            .product-card img {
                height: 180px;
            }
            .product-card .product-name {
                font-size: 15px;
            }
            .product-card .product-price {
                font-size: 18px;
            }
        }
        @media (max-width: 500px) {
            #custom-logo { height: 133px; }
            .products-container { gap: 12px; }
            .product-card img { height: 150px; }
            .social-icon { width: 32px; height: 32px; }
            .social-bar { gap: 20px; }
        }
        @media (max-width: 400px) {
            #custom-logo { height: 118px; }
            .products-container {
                flex-direction: column;
                align-items: center;
                gap: 14px;
            }
            .product-card {
                max-width: 280px;
                width: 100%;
                flex: none;
            }
            .product-card img { height: 200px; }
            .social-icon { width: 28px; height: 28px; }
            .social-bar { gap: 16px; }
        }
    </style>
</head>
<body>

<script>
    (function() {
        // Simulación de carga
        const loadingScreen = document.getElementById('loading-screen');
        const barFill = document.getElementById('loading-bar-fill');
        const percentageEl = document.getElementById('loading-percentage');
        const appRoot = document.getElementById('app-root');
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 6) + 1;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                barFill.style.width = '100%';
                percentageEl.textContent = '100%';
                setTimeout(() => {
                    loadingScreen.style.opacity = '0';
                    loadingScreen.style.transition = 'opacity 0.4s ease';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                        appRoot.style.display = 'block';
                    }, 400);
                }, 200);
            } else {
                barFill.style.width = progress + '%';
                percentageEl.textContent = progress + '%';
            }
        }, 80);
    })();
</script>
