        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            overflow: hidden;
            position: fixed;
            top: 0; bottom: 0; left: 0; right: 0;
            background: black;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* PANTALLA DE CARGA MINIMALISTA (solo línea) */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .loading-bar-container {
            width: 180px;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: #66cddd;
            border-radius: 3px;
            transition: width 0.08s linear;
        }
        .loading-percentage-text {
            margin-top: 16px;
            font-size: 14px;
            font-weight: 400;
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.5px;
        }

        /* CAPA PRINCIPAL OCULTA HASTA QUE CARGUE */
        #app-root {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* LOGO CENTRADO ARRIBA (reducido 13%: 177px) */
        .logo-center-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            padding: 0 20px;
        }
        #custom-logo {
            height: 177px;   /* antes 204px, ahora 177px (13% menos) */
            width: auto;
            max-width: 85vw;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
        }

        /* ÁREA PRINCIPAL DEL CARRUSEL */
        .stage-mio {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 60vh;
            max-height: 600px;
            min-height: 350px;
            perspective: 1200px;
        }
        .carousel-mio {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
        }
        .card-mio {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-style: preserve-3d;
            border-radius: 24px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transition: transform 0.45s cubic-bezier(0.23, 1, 0.32, 1), width 0.4s, height 0.4s;
            will-change: transform;
        }
        .card-mio img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            pointer-events: none;
        }

        /* BARRA INFERIOR (WhatsApp + redes) - SIN CAMBIOS */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 20px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            z-index: 50;
            pointer-events: none;
        }
        .bottom-bar > * {
            pointer-events: auto;
        }
        .boton-wa-mio {
            display: inline-block;
            width: fit-content;
            min-width: 200px;
            height: 48px;
            padding: 0 24px;
            border-radius: 60px;
            background: #25D366;
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            line-height: 48px;
            box-shadow: 0 6px 20px rgba(37,211,102,0.4);
            transition: transform 0.15s, box-shadow 0.2s;
        }
        .boton-wa-mio:active {
            transform: scale(0.96);
            box-shadow: 0 3px 10px rgba(37,211,102,0.6);
        }
        .social-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
        }
        .social-icon {
            display: inline-block;
            width: 36px;
            height: 36px;
            transition: transform 0.2s;
            opacity: 0.85;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        .social-icon:hover {
            transform: scale(1.1);
            opacity: 1;
        }
        .social-icon svg {
            width: 100%;
            height: 100%;
            fill: white;
        }

        /* Ajustes responsive (reducidos 13%) */
        @media (max-width: 500px) {
            #custom-logo { height: 133px; }  /* antes 153px */
            .stage-mio { height: 55vh; min-height: 300px; }
            .boton-wa-mio { height: 44px; line-height: 44px; font-size: 14px; min-width: 180px; }
            .social-links { gap: 20px; }
            .social-icon { width: 32px; height: 32px; }
        }
        @media (max-width: 400px) {
            #custom-logo { height: 118px; }  /* antes 136px */
            .stage-mio { height: 50vh; min-height: 280px; }
            .social-links { gap: 16px; }
            .social-icon { width: 28px; height: 28px; }
        }
    </style>
</head>

<script>
    (function() {
        // ---------- SIMULACIÓN DE CARGA (línea de progreso minimalista) ----------
        const loadingScreen = document.getElementById('loading-screen');
        const barFill = document.getElementById('loading-bar-fill');
        const percentageEl = document.getElementById('loading-percentage');
        const appRoot = document.getElementById('app-root');
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 6) + 1;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                barFill.style.width = '100%';
                percentageEl.textContent = '100%';
                setTimeout(() => {
                    loadingScreen.style.opacity = '0';
                    loadingScreen.style.transition = 'opacity 0.4s ease';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                        appRoot.style.display = 'block';
                        initCarousel();
                    }, 400);
                }, 200);
            } else {
                barFill.style.width = progress + '%';
                percentageEl.textContent = progress + '%';
            }
        }, 80);

        // ---------- CARRUSEL 3D ----------
        function initCarousel() {
            const cards = Array.from(document.querySelectorAll('.card-mio'));
            const total = cards.length;
            const carousel = document.getElementById('carouselFinal');
            let activeIndex = 0;
            let isDragging = false;
            let startX = 0;
            let dragDelta = 0;

            function getLayout() {
                const w = window.innerWidth;
                if (w <= 360) return { cW: 220, cH: 320, sW: 175, sH: 280, offY: 6, x1: 118, x2: 215, scl1: 0.85, scl2: 0.79, rot1: 23, rot2: 32 };
                if (w <= 390) return { cW: 232, cH: 338, sW: 185, sH: 295, offY: 6, x1: 125, x2: 228, scl1: 0.86, scl2: 0.80, rot1: 22, rot2: 31 };
                if (w <= 430) return { cW: 248, cH: 354, sW: 198, sH: 310, offY: 6, x1: 134, x2: 242, scl1: 0.87, scl2: 0.81, rot1: 21, rot2: 30 };
                return { cW: 264, cH: 370, sW: 210, sH: 324, offY: 6, x1: 142, x2: 256, scl1: 0.88, scl2: 0.82, rot1: 20, rot2: 29 };
            }

            function applyLayout() {
                const l = getLayout();
                cards.forEach((card, i) => {
                    let diff = i - activeIndex;
                    let d = ((diff % total) + total) % total;
                    if (d > total/2) d -= total;
                    let x=0, y=0, scale=1, ry=0, opacity=1, z=3, w=l.cW, h=l.cH;
                    if (d === 0) {
                        x=0; y=0; scale=1; ry=0; z=5; w=l.cW; h=l.cH;
                    } else if (d === -1) {
                        x = -l.x1; y = l.offY; scale = l.scl1; ry = l.rot1; z = 3; w = l.sW; h = l.sH;
                    } else if (d === 1) {
                        x = l.x1; y = l.offY; scale = l.scl1; ry = -l.rot1; z = 3; w = l.sW; h = l.sH;
                    } else if (d === -2) {
                        x = -l.x2; y = l.offY + 4; scale = l.scl2; ry = l.rot2; z = 1; w = Math.round(l.sW * 0.94); h = Math.round(l.sH * 0.94);
                    } else if (d === 2) {
                        x = l.x2; y = l.offY + 4; scale = l.scl2; ry = -l.rot2; z = 1; w = Math.round(l.sW * 0.94); h = Math.round(l.sH * 0.94);
                    } else {
                        opacity = 0; z = 0; scale = 0.7;
                    }
                    card.style.width = w + 'px';
                    card.style.height = h + 'px';
                    card.style.opacity = opacity;
                    card.style.zIndex = z;
                    card.style.transform = `translate(-50%, -50%) translateX(${x}px) translateY(${y}px) rotateY(${ry}deg) scale(${scale})`;
                });
            }

            function next() { activeIndex = (activeIndex+1)%total; applyLayout(); }
            function prev() { activeIndex = (activeIndex-1+total)%total; applyLayout(); }

            carousel.addEventListener('pointerdown', (e) => {
                isDragging = true;
                startX = e.clientX;
                dragDelta = 0;
                carousel.setPointerCapture?.(e.pointerId);
            });
            carousel.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                dragDelta = e.clientX - startX;
            });
            carousel.addEventListener('pointerup', () => {
                if (!isDragging) return;
                isDragging = false;
                if (Math.abs(dragDelta) > 40) {
                    dragDelta < 0 ? next() : prev();
                } else {
                    applyLayout();
                }
            });
            carousel.addEventListener('pointercancel', () => { isDragging = false; applyLayout(); });
            carousel.addEventListener('pointerleave', () => { isDragging = false; applyLayout(); });
            window.addEventListener('resize', applyLayout);
            applyLayout();
        }
    })();
</script>
