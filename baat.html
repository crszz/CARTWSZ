        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            overflow: hidden;
            position: fixed;
            top: 0; bottom: 0; left: 0; right: 0;
            background: black;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .loading-bar-container {
            width: 180px;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: #66cddd;
            border-radius: 3px;
            transition: width 0.08s linear;
        }
        .loading-percentage-text {
            margin-top: 16px;
            font-size: 14px;
            font-weight: 400;
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.5px;
        }

        #app-root {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .logo-center-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            padding: 0 20px;
        }
        #custom-logo {
            height: 177px;
            width: auto;
            max-width: 85vw;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
        }

        /* NUEVO CARRUSEL PLANO */
        .carousel-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;
            max-width: 600px;
            height: 60vh;
            max-height: 500px;
            min-height: 350px;
            overflow: hidden;
        }
        .carousel-track {
            display: flex;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }
        .carousel-card {
            flex: 0 0 100%;
            height: 100%;
            border-radius: 24px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .carousel-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* FLECHAS SUTILES */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: background 0.2s, opacity 0.2s;
            opacity: 0.6;
            border: none;
        }
        .arrow:hover {
            background: rgba(255,255,255,0.3);
            opacity: 1;
        }
        .arrow svg {
            width: 18px;
            height: 18px;
            fill: white;
        }
        .arrow-left {
            left: 10px;
        }
        .arrow-right {
            right: 10px;
        }

        /* BARRA INFERIOR (WhatsApp + redes) */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 20px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            z-index: 50;
            pointer-events: none;
        }
        .bottom-bar > * {
            pointer-events: auto;
        }
        .boton-wa-mio {
            display: inline-block;
            width: fit-content;
            min-width: 200px;
            height: 48px;
            padding: 0 24px;
            border-radius: 60px;
            background: #25D366;
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            line-height: 48px;
            box-shadow: 0 6px 20px rgba(37,211,102,0.4);
            transition: transform 0.15s, box-shadow 0.2s;
        }
        .boton-wa-mio:active {
            transform: scale(0.96);
            box-shadow: 0 3px 10px rgba(37,211,102,0.6);
        }
        .social-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
        }
        .social-icon {
            display: inline-block;
            width: 36px;
            height: 36px;
            transition: transform 0.2s;
            opacity: 0.85;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        .social-icon:hover {
            transform: scale(1.1);
            opacity: 1;
        }
        .social-icon svg {
            width: 100%;
            height: 100%;
            fill: white;
        }

        /* Responsive */
        @media (max-width: 500px) {
            #custom-logo { height: 133px; }
            .carousel-container { height: 55vh; min-height: 300px; }
            .boton-wa-mio { height: 44px; line-height: 44px; font-size: 14px; min-width: 180px; }
            .social-links { gap: 20px; }
            .social-icon { width: 32px; height: 32px; }
        }
        @media (max-width: 400px) {
            #custom-logo { height: 118px; }
            .carousel-container { height: 50vh; min-height: 280px; }
            .social-links { gap: 16px; }
            .social-icon { width: 28px; height: 28px; }
        }
    </style>
</head>

<script>
    (function() {
        // Carga
        const loadingScreen = document.getElementById('loading-screen');
        const barFill = document.getElementById('loading-bar-fill');
        const percentageEl = document.getElementById('loading-percentage');
        const appRoot = document.getElementById('app-root');
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 6) + 1;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                barFill.style.width = '100%';
                percentageEl.textContent = '100%';
                setTimeout(() => {
                    loadingScreen.style.opacity = '0';
                    loadingScreen.style.transition = 'opacity 0.4s ease';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                        appRoot.style.display = 'block';
                        initCarousel();
                    }, 400);
                }, 200);
            } else {
                barFill.style.width = progress + '%';
                percentageEl.textContent = progress + '%';
            }
        }, 80);

        // Nuevo carrusel plano
        function initCarousel() {
            const track = document.getElementById('carouselTrack');
            const cards = Array.from(track.children);
            const total = cards.length;
            let currentIndex = 0;
            let isDragging = false;
            let startX = 0;
            let currentTranslate = 0;
            let prevTranslate = 0;

            const updateSlidePosition = () => {
                track.style.transform = `translateX(-${currentIndex * 100}%)`;
            };

            const next = () => {
                currentIndex = (currentIndex + 1) % total;
                updateSlidePosition();
            };
            const prev = () => {
                currentIndex = (currentIndex - 1 + total) % total;
                updateSlidePosition();
            };

            document.getElementById('nextBtn').addEventListener('click', next);
            document.getElementById('prevBtn').addEventListener('click', prev);

            // Arrastre táctil/ratón
            track.addEventListener('pointerdown', (e) => {
                isDragging = true;
                startX = e.clientX;
                prevTranslate = -currentIndex * track.clientWidth;
                track.style.transition = 'none';
                track.setPointerCapture?.(e.pointerId);
            });
            track.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                const delta = e.clientX - startX;
                currentTranslate = prevTranslate + delta;
                // Limitar arrastre un poco
                track.style.transform = `translateX(${currentTranslate}px)`;
            });
            track.addEventListener('pointerup', () => {
                if (!isDragging) return;
                isDragging = false;
                track.style.transition = 'transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                const movedBy = currentTranslate - prevTranslate;
                // Si se movió suficiente, cambiar slide
                if (movedBy < -50) {
                    next();
                } else if (movedBy > 50) {
                    prev();
                } else {
                    updateSlidePosition();
                }
            });
            track.addEventListener('pointercancel', () => {
                isDragging = false;
                track.style.transition = 'transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                updateSlidePosition();
            });
            track.addEventListener('pointerleave', () => {
                if (isDragging) {
                    isDragging = false;
                    track.style.transition = 'transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                    updateSlidePosition();
                }
            });
            window.addEventListener('resize', updateSlidePosition);
            updateSlidePosition();
        }
    })();
</script>
