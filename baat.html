<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CARTWSZZ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --black: #080808;
            --white: #ffffff;
            --grey: rgba(255,255,255,0.06);
            --grey-border: rgba(255,255,255,0.1);
            --accent: #ffffff;
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            position: fixed;
            inset: 0;
            background: var(--black);
            font-family: 'DM Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ── GRAIN OVERLAY ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1000;
            pointer-events: none;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }

        /* ── LOADING ── */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: var(--black);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .loading-logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            letter-spacing: 0.15em;
            color: var(--white);
            opacity: 0.9;
        }
        .loading-bar-container {
            width: 120px;
            height: 1px;
            background: rgba(255,255,255,0.12);
            overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--white);
            transition: width 0.08s linear;
        }
        .loading-percentage-text {
            font-size: 11px;
            font-weight: 300;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.2em;
        }

        /* ── APP ROOT ── */
        #app-root {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* ── LOGO ── */
        .logo-center-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
        #custom-logo {
            height: 130px;
            width: auto;
            max-width: 80vw;
            object-fit: contain;
            display: block;
        }
        @media (max-width: 390px) { #custom-logo { height: 108px; } }
        @media (max-width: 360px) { #custom-logo { height: 96px; } }

        /* ── STAGE & CAROUSEL ── */
        .stage-mio {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 62vh;
            max-height: 560px;
            min-height: 320px;
            perspective: 1100px;
        }
        .carousel-mio {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
        }
        .card-mio {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-style: preserve-3d;
            border-radius: 20px;
            overflow: hidden;
            background: #111;
            /* sin sombra — removed completely */
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                        width 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                        height 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                        opacity 0.5s ease;
            will-change: transform;
            cursor: pointer;
        }
        /* Borde sutil en lugar de sombra */
        .card-mio::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            pointer-events: none;
            z-index: 2;
        }
        .card-mio img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            pointer-events: none;
        }

        /* ── ARROW BUTTONS ── */
        .arrow-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 200;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.14);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, border-color 0.2s;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .arrow-btn:active {
            transform: translateY(-50%) scale(0.92);
            background: rgba(255,255,255,0.14);
        }
        .arrow-btn svg {
            width: 18px;
            height: 18px;
            stroke: var(--white);
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        #btn-prev { left: 14px; }
        #btn-next { right: 14px; }

        /* ── DOTS ── */
        .dots-container {
            position: fixed;
            bottom: 128px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 7px;
            align-items: center;
        }
        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            transition: background 0.3s, transform 0.3s;
        }
        .dot.active {
            background: var(--white);
            transform: scale(1.35);
        }

        /* ── BOTTOM BAR ── */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0 20px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            background: linear-gradient(transparent, rgba(8,8,8,0.92) 40%);
            z-index: 50;
            pointer-events: none;
        }
        .bottom-bar > * { pointer-events: auto; }

        /* WhatsApp button — estética de la marca, NO verde */
        .boton-wa-mio {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            min-width: 200px;
            height: 48px;
            padding: 0 28px;
            border-radius: 60px;
            background: var(--white);
            color: var(--black);
            text-decoration: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: transform 0.15s, background 0.2s;
            border: none;
        }
        .boton-wa-mio svg {
            width: 17px;
            height: 17px;
            flex-shrink: 0;
        }
        .boton-wa-mio:active {
            transform: scale(0.96);
            background: rgba(255,255,255,0.88);
        }

        /* Social icons */
        .social-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 22px;
        }
        .social-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            opacity: 0.5;
            transition: opacity 0.2s, transform 0.2s;
        }
        .social-icon:active { opacity: 1; transform: scale(1.1); }
        .social-icon svg { width: 100%; height: 100%; fill: white; }

        @media (max-width: 390px) {
            .stage-mio { height: 57vh; min-height: 290px; }
            .boton-wa-mio { height: 44px; font-size: 12px; min-width: 180px; }
            .dots-container { bottom: 118px; }
        }
        @media (max-width: 360px) {
            .stage-mio { height: 52vh; min-height: 270px; }
        }
    </style>
</head>

<script>
(function () {
    /* ── LOADING ── */
    const loadingScreen = document.getElementById('loading-screen');
    const barFill       = document.getElementById('loading-bar-fill');
    const percentageEl  = document.getElementById('loading-percentage');
    const appRoot       = document.getElementById('app-root');
    let progress = 0;

    const interval = setInterval(() => {
        progress += Math.floor(Math.random() * 7) + 2;
        if (progress >= 100) {
            progress = 100;
            clearInterval(interval);
            barFill.style.width = '100%';
            percentageEl.textContent = '100%';
            setTimeout(() => {
                loadingScreen.style.transition = 'opacity 0.5s ease';
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    appRoot.style.display = 'block';
                    initCarousel();
                }, 500);
            }, 180);
        } else {
            barFill.style.width = progress + '%';
            percentageEl.textContent = progress + '%';
        }
    }, 75);

    /* ── CAROUSEL ── */
    function initCarousel() {
        const cards    = Array.from(document.querySelectorAll('.card-mio'));
        const total    = cards.length;
        let activeIndex = 0;
        let isDragging  = false;
        let startX      = 0;
        let dragDelta   = 0;
        let isAnimating = false;

        /* Build dots */
        const dotsContainer = document.getElementById('dots');
        cards.forEach((_, i) => {
            const d = document.createElement('div');
            d.className = 'dot' + (i === 0 ? ' active' : '');
            dotsContainer.appendChild(d);
        });

        function updateDots() {
            document.querySelectorAll('.dot').forEach((d, i) => {
                d.classList.toggle('active', i === activeIndex);
            });
        }

        function getLayout() {
            const w = window.innerWidth;
            // cW/cH = card activa, sW/sH = card lateral, offY = bajada lateral
            // x1 = offset lateral 1er plano, x2 = 2do plano
            if (w <= 360) return { cW:210, cH:310, sW:168, sH:272, offY:8, x1:112, x2:196, scl1:0.84, scl2:0.78, rot1:20, rot2:28 };
            if (w <= 390) return { cW:228, cH:332, sW:182, sH:290, offY:8, x1:120, x2:210, scl1:0.85, scl2:0.79, rot1:19, rot2:27 };
            if (w <= 430) return { cW:244, cH:350, sW:195, sH:306, offY:8, x1:128, x2:224, scl1:0.86, scl2:0.80, rot1:18, rot2:26 };
            return { cW:260, cH:368, sW:208, sH:320, offY:8, x1:136, x2:238, scl1:0.87, scl2:0.81, rot1:17, rot2:25 };
        }

        function applyLayout(skipTransition) {
            const l = getLayout();
            cards.forEach((card, i) => {
                let diff = i - activeIndex;
                let d = ((diff % total) + total) % total;
                if (d > total / 2) d -= total;

                let x=0, y=0, scale=1, ry=0, opacity=1, z=3, w=l.cW, h=l.cH;

                if (d === 0) {
                    x=0; y=0; scale=1; ry=0; z=5; w=l.cW; h=l.cH; opacity=1;
                } else if (d === -1 || d === 1) {
                    const dir = d === -1 ? -1 : 1;
                    x = dir * l.x1; y = l.offY; scale = l.scl1; ry = -dir * l.rot1; z = 3;
                    w = l.sW; h = l.sH; opacity = 0.72;
                } else if (d === -2 || d === 2) {
                    const dir = d === -2 ? -1 : 1;
                    x = dir * l.x2; y = l.offY + 6; scale = l.scl2; ry = -dir * l.rot2; z = 1;
                    w = Math.round(l.sW * 0.93); h = Math.round(l.sH * 0.93); opacity = 0.42;
                } else {
                    opacity = 0; z = 0; scale = 0.7;
                }

                if (skipTransition) {
                    card.style.transition = 'none';
                } else {
                    card.style.transition = 'transform 0.52s cubic-bezier(0.16,1,0.3,1), width 0.52s cubic-bezier(0.16,1,0.3,1), height 0.52s cubic-bezier(0.16,1,0.3,1), opacity 0.45s ease';
                }

                card.style.width   = w + 'px';
                card.style.height  = h + 'px';
                card.style.opacity = opacity;
                card.style.zIndex  = z;
                card.style.transform = `translate(-50%,-50%) translateX(${x}px) translateY(${y}px) rotateY(${ry}deg) scale(${scale})`;
            });
            updateDots();
        }

        function next() {
            if (isAnimating) return;
            isAnimating = true;
            activeIndex = (activeIndex + 1) % total;
            applyLayout(false);
            setTimeout(() => { isAnimating = false; }, 540);
        }
        function prev() {
            if (isAnimating) return;
            isAnimating = true;
            activeIndex = (activeIndex - 1 + total) % total;
            applyLayout(false);
            setTimeout(() => { isAnimating = false; }, 540);
        }

        /* Arrow buttons */
        document.getElementById('btn-prev').addEventListener('click', prev);
        document.getElementById('btn-next').addEventListener('click', next);

        /* Swipe */
        const carousel = document.getElementById('carouselFinal');
        carousel.addEventListener('pointerdown', (e) => {
            isDragging = true; startX = e.clientX; dragDelta = 0;
            carousel.setPointerCapture && carousel.setPointerCapture(e.pointerId);
        });
        carousel.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            dragDelta = e.clientX - startX;
        });
        carousel.addEventListener('pointerup', () => {
            if (!isDragging) return;
            isDragging = false;
            if (Math.abs(dragDelta) > 38) {
                dragDelta < 0 ? next() : prev();
            }
        });
        carousel.addEventListener('pointercancel', () => { isDragging = false; });

        /* Card tap — centrar */
        cards.forEach((card, i) => {
            card.addEventListener('click', () => {
                if (Math.abs(dragDelta) > 8) return;
                if (i !== activeIndex) {
                    activeIndex = i;
                    applyLayout(false);
                }
            });
        });

        window.addEventListener('resize', () => applyLayout(true));
        applyLayout(true);
    }
})();
</script>
</body>
