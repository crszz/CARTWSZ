<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Carrusel 3D - Funcional</title>
  <style>
    /* RESET ABSOLUTO */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;  /* Nada de espacio arriba */
      overflow-y: auto;
    }

    /* Contenedor principal: sin márgenes */
    .mi-carrusel-wrapper {
      width: 100%;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: #000;
    }

    /* LOGO - Tamaño normal, sin espacios alrededor */
    .logo-container-mio {
      width: 100%;
      text-align: center;
      margin: 0;
      padding: 0;
      line-height: 0;
    }
    .logo-container-mio img {
      display: block;
      margin: 0 auto;
      height: 60px;       /* Tamaño visible pero no exagerado */
      width: auto;
      max-width: 85vw;
      object-fit: contain;
    }

    /* CARRUSEL 3D - con perspectiva y preserve-3d */
    .stage-mio {
      position: relative;
      width: 100vw;
      height: 52vh;       /* Altura flexible pero proporcionada */
      min-height: 340px;
      max-height: 440px;
      overflow: hidden;
      perspective: 1200px;
      margin: 12px 0;
    }
    .carousel-mio {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }
    .card-mio {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-style: preserve-3d;
      border-radius: 24px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1), width 0.4s, height 0.4s;
      will-change: transform;
    }
    .card-mio img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      pointer-events: none;
    }

    /* BOTÓN WHATSAPP */
    .boton-wa-mio {
      display: block;
      width: fit-content;
      max-width: 90vw;
      min-width: 200px;
      height: 48px;
      padding: 0 24px;
      border-radius: 60px;
      background: #fff;
      color: #000;
      text-decoration: none;
      font-size: 15px;
      font-weight: bold;
      text-align: center;
      line-height: 48px;
      margin: 8px auto 6px auto;
      border: none;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      transition: transform 0.1s;
    }
    .boton-wa-mio:active {
      transform: scale(0.97);
    }

    /* REDES SOCIALES */
    .social-links {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 28px;
      margin: 4px 0 15px 0;
    }
    .social-icon {
      display: inline-block;
      width: 38px;
      height: 38px;
      transition: transform 0.2s;
      opacity: 0.9;
    }
    .social-icon:hover {
      transform: scale(1.08);
      opacity: 1;
    }
    .social-icon svg {
      width: 100%;
      height: 100%;
      fill: white;
    }

    /* Responsive para que quepa en pantallas pequeñas */
    @media (max-width: 500px) {
      .logo-container-mio img { height: 50px; }
      .stage-mio { height: 48vh; min-height: 300px; margin: 8px 0; }
      .boton-wa-mio { height: 44px; line-height: 44px; font-size: 14px; min-width: 180px; }
      .social-links { gap: 22px; }
      .social-icon { width: 34px; height: 34px; }
    }
    @media (max-width: 400px) {
      .stage-mio { height: 46vh; min-height: 280px; }
      .social-links { gap: 18px; }
      .social-icon { width: 32px; height: 32px; }
    }
  </style>
</head>
<body>

      <article class="card-mio"><img src="images/descarga%20%281%29.png" alt="Producto" onerror="this.onerror=null; this.src='https://picsum.photos/id/20/400/500'"></article>

</div>

<script>
  (function(){
    const cards = Array.from(document.querySelectorAll('.card-mio'));
    const total = cards.length;
    const carousel = document.getElementById('carouselFinal');
    let activeIndex = 0;
    let isDragging = false;
    let startX = 0;
    let dragDelta = 0;

    function getLayout() {
      const w = window.innerWidth;
      if (w <= 360) return { cW: 220, cH: 320, sW: 175, sH: 280, offY: 6, x1: 118, x2: 215, scl1: 0.85, scl2: 0.79, rot1: 23, rot2: 32 };
      if (w <= 390) return { cW: 232, cH: 338, sW: 185, sH: 295, offY: 6, x1: 125, x2: 228, scl1: 0.86, scl2: 0.80, rot1: 22, rot2: 31 };
      if (w <= 430) return { cW: 248, cH: 354, sW: 198, sH: 310, offY: 6, x1: 134, x2: 242, scl1: 0.87, scl2: 0.81, rot1: 21, rot2: 30 };
      return { cW: 264, cH: 370, sW: 210, sH: 324, offY: 6, x1: 142, x2: 256, scl1: 0.88, scl2: 0.82, rot1: 20, rot2: 29 };
    }

    function applyLayout() {
      const l = getLayout();
      cards.forEach((card, i) => {
        let diff = i - activeIndex;
        let d = ((diff % total) + total) % total;
        if (d > total/2) d -= total;
        let x=0, y=0, scale=1, ry=0, opacity=1, z=3, w=l.cW, h=l.cH;
        if (d === 0) {
          x=0; y=0; scale=1; ry=0; z=5; w=l.cW; h=l.cH;
        } else if (d === -1) {
          x = -l.x1; y = l.offY; scale = l.scl1; ry = l.rot1; z = 3; w = l.sW; h = l.sH;
        } else if (d === 1) {
          x = l.x1; y = l.offY; scale = l.scl1; ry = -l.rot1; z = 3; w = l.sW; h = l.sH;
        } else if (d === -2) {
          x = -l.x2; y = l.offY + 4; scale = l.scl2; ry = l.rot2; z = 1; w = Math.round(l.sW * 0.94); h = Math.round(l.sH * 0.94);
        } else if (d === 2) {
          x = l.x2; y = l.offY + 4; scale = l.scl2; ry = -l.rot2; z = 1; w = Math.round(l.sW * 0.94); h = Math.round(l.sH * 0.94);
        } else {
          opacity = 0; z = 0; scale = 0.7;
        }
        card.style.width = w + 'px';
        card.style.height = h + 'px';
        card.style.opacity = opacity;
        card.style.zIndex = z;
        card.style.transform = `translate(-50%, -50%) translateX(${x}px) translateY(${y}px) rotateY(${ry}deg) scale(${scale})`;
      });
    }

    function next() { activeIndex = (activeIndex+1)%total; applyLayout(); }
    function prev() { activeIndex = (activeIndex-1+total)%total; applyLayout(); }

    carousel.addEventListener('pointerdown', (e) => {
      isDragging = true;
      startX = e.clientX;
      dragDelta = 0;
      carousel.setPointerCapture?.(e.pointerId);
    });
    carousel.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      dragDelta = e.clientX - startX;
    });
    carousel.addEventListener('pointerup', () => {
      if (!isDragging) return;
      isDragging = false;
      if (Math.abs(dragDelta) > 40) {
        dragDelta < 0 ? next() : prev();
      } else {
        applyLayout();
      }
    });
    carousel.addEventListener('pointercancel', () => { isDragging = false; applyLayout(); });
    carousel.addEventListener('pointerleave', () => { isDragging = false; applyLayout(); });
    window.addEventListener('resize', applyLayout);
    applyLayout();
  })();
</script>
