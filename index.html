<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Carrusel 3D | Centro perfecto</title>
  <!-- Google Fonts: futurista -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    /* ---------- RESET ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      width: 100%;
      height: 100vh;
      background: black;
      font-family: 'Orbitron', 'Share Tech Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Contenedor principal: ocupa toda la pantalla y usa flex para distribuir */
    .app {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: black;
    }

    /* Logo con margen inferior de 5px */
    .logo-area {
      text-align: center;
      margin-bottom: 5px;   /* ← 5px exactos */
      flex-shrink: 0;
    }
    .logo {
      display: block;
      margin: 0 auto;
      height: 55px;
      width: auto;
      max-width: 85vw;
      object-fit: contain;
    }

    /* Contenedor del carrusel: ocupa todo el espacio disponible y centra su contenido */
    .carousel-wrapper {
      flex: 1;
      display: flex;
      align-items: center;     /* centra verticalmente el carrusel */
      justify-content: center; /* centra horizontalmente */
      width: 100%;
      overflow: visible;
      perspective: 1200px;
      margin: 8px 0;
    }

    .carousel {
      position: relative;
      width: 100%;
      height: 380px;           /* altura base, se ajusta en móvil */
      transform-style: preserve-3d;
    }

    /* Tarjeta 3D */
    .card {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 260px;
      height: 360px;
      margin-left: -130px;
      margin-top: -180px;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.15);
      transition: transform 0.55s cubic-bezier(0.23, 1, 0.32, 1), width 0.4s, height 0.4s, opacity 0.3s;
      transform-style: preserve-3d;
      will-change: transform;
    }
    .card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      pointer-events: none;
    }

    /* Bloque inferior: botón + redes, con margen superior 5px */
    .bottom-area {
      flex-shrink: 0;
      margin-top: 5px;        /* ← 5px exactos arriba del botón */
      text-align: center;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding-bottom: 15px;
    }

    /* Botón WhatsApp futurista */
    .wa-button {
      display: inline-block;
      background: white;
      color: black;
      text-decoration: none;
      font-family: 'Orbitron', monospace;
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 2px;
      padding: 12px 28px;
      border-radius: 60px;
      text-transform: uppercase;
      transition: 0.2s;
      box-shadow: 0 5px 18px rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .wa-button:active { transform: scale(0.96); background: #e0e0e0; }

    /* Redes sociales (íconos sólidos blancos) */
    .social-links {
      display: flex;
      gap: 32px;
      justify-content: center;
      align-items: center;
    }
    .social-icon {
      width: 40px;
      height: 40px;
      transition: transform 0.2s;
      opacity: 0.9;
    }
    .social-icon:hover { transform: scale(1.08); opacity: 1; }
    .social-icon svg { width: 100%; height: 100%; fill: white; }

    /* Responsive: ajusta tamaño de las tarjetas para que no se recorten */
    @media (max-width: 550px) {
      .carousel { height: 330px; }
      .card { width: 220px; height: 310px; margin-left: -110px; margin-top: -155px; }
      .logo { height: 48px; }
      .wa-button { font-size: 0.75rem; padding: 10px 22px; }
      .social-icon { width: 36px; height: 36px; }
      .social-links { gap: 25px; }
    }
    @media (max-width: 430px) {
      .carousel { height: 290px; }
      .card { width: 190px; height: 270px; margin-left: -95px; margin-top: -135px; }
      .logo { height: 42px; }
      .wa-button { font-size: 0.7rem; padding: 8px 18px; }
      .social-icon { width: 32px; height: 32px; }
      .social-links { gap: 20px; }
    }
  </style>
</head>
<body>

</div>

<script>
  (function() {
    const cards = Array.from(document.querySelectorAll('.card'));
    const total = cards.length;
    const container = document.getElementById('carousel3d');
    let active = 0;
    let dragging = false;
    let startX = 0;
    let diff = 0;

    function getSizes() {
      const w = window.innerWidth;
      if (w <= 430) {
        return {
          cw: 190, ch: 270,
          sw: 160, sh: 240,
          offY: 4,
          x1: 100, x2: 182,
          sc1: 0.85, sc2: 0.78,
          rot1: 18, rot2: 27
        };
      } else if (w <= 550) {
        return {
          cw: 220, ch: 310,
          sw: 185, sh: 275,
          offY: 5,
          x1: 118, x2: 212,
          sc1: 0.87, sc2: 0.80,
          rot1: 20, rot2: 29
        };
      } else {
        return {
          cw: 260, ch: 360,
          sw: 220, sh: 320,
          offY: 6,
          x1: 140, x2: 258,
          sc1: 0.88, sc2: 0.81,
          rot1: 22, rot2: 31
        };
      }
    }

    function update() {
      const s = getSizes();
      cards.forEach((card, i) => {
        let d = i - active;
        let dist = ((d % total) + total) % total;
        if (dist > total/2) dist -= total;

        let x = 0, y = 0, scale = 1, ry = 0, opacity = 1, z = 3;
        let w = s.cw, h = s.ch;

        if (dist === 0) {
          x = 0; y = 0; scale = 1; ry = 0; z = 8;
          w = s.cw; h = s.ch;
        } else if (dist === -1 || dist === 1) {
          let left = dist === -1;
          x = left ? -s.x1 : s.x1;
          y = s.offY;
          scale = s.sc1;
          ry = left ? s.rot1 : -s.rot1;
          z = 4;
          w = s.sw; h = s.sh;
        } else if (dist === -2 || dist === 2) {
          let left = dist === -2;
          x = left ? -s.x2 : s.x2;
          y = s.offY + 4;
          scale = s.sc2;
          ry = left ? s.rot2 : -s.rot2;
          z = 2;
          w = Math.floor(s.sw * 0.94);
          h = Math.floor(s.sh * 0.94);
        } else {
          opacity = 0;
          z = 0;
          scale = 0.5;
        }
        card.style.width = w + 'px';
        card.style.height = h + 'px';
        card.style.opacity = opacity;
        card.style.zIndex = z;
        card.style.transform = `translate(-50%, -50%) translateX(${x}px) translateY(${y}px) rotateY(${ry}deg) scale(${scale})`;
      });
    }

    function next() { active = (active + 1) % total; update(); }
    function prev() { active = (active - 1 + total) % total; update(); }

    container.addEventListener('pointerdown', (e) => {
      dragging = true;
      startX = e.clientX;
      diff = 0;
      container.setPointerCapture?.(e.pointerId);
      e.preventDefault();
    });
    container.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      diff = e.clientX - startX;
    });
    container.addEventListener('pointerup', () => {
      if (!dragging) return;
      dragging = false;
      if (Math.abs(diff) > 40) {
        diff < 0 ? next() : prev();
      } else {
        update();
      }
      diff = 0;
    });
    container.addEventListener('pointercancel', () => { dragging = false; update(); });
    container.addEventListener('pointerleave', () => { if (dragging) { dragging = false; update(); } });
    window.addEventListener('resize', update);
    update();
  })();
</script>

</html>
