<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Carrusel - Logo 5x gigante</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 0;
    }

    .mi-carrusel-wrapper {
      width: 100%;
      max-width: 100vw;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 20px 0 40px;
    }

    /* LOGO: 5 VECES MÁS GRANDE (240px de alto) */
    .logo-container-mio {
      width: 100%;
      text-align: center;
      margin-bottom: 20px;
      margin-top: 10px;
    }
    .logo-container-mio img {
      display: block;
      margin: 0 auto;
      height: 240px;         /* 5 veces más grande (48px * 5 = 240px) */
      width: auto;
      max-width: 90vw;
      object-fit: contain;
      border-radius: 20px;   /* suave */
    }

    /* Carrusel */
    .stage-mio {
      position: relative;
      width: 100vw;
      height: min(60vh, 480px);
      overflow: hidden;
      perspective: 1600px;
      touch-action: none;
      user-select: none;
    }
    .carousel-mio {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
    }
    .card-mio {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-style: preserve-3d;
      border-radius: 26px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 22px 60px rgba(0,0,0,.42);
      transition: transform 0.45s cubic-bezier(.22,.8,.18,1), width 0.45s cubic-bezier(.22,.8,.18,1), height 0.45s cubic-bezier(.22,.8,.18,1), opacity 0.25s ease;
    }
    .card-mio img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      pointer-events: none;
    }

    /* Botón WhatsApp */
    .boton-wa-mio {
      display: block !important;
      width: fit-content !important;
      max-width: 90vw !important;
      min-width: 220px;
      height: 54px;
      padding: 0 28px !important;
      border-radius: 999px;
      background: #fff !important;
      color: #000 !important;
      text-decoration: none !important;
      font-size: 15px !important;
      font-weight: 700 !important;
      text-align: center;
      line-height: 54px;
      margin: 20px auto 0 auto !important;
      border: 1px solid rgba(255,255,255,.2);
      box-shadow: 0 12px 30px rgba(0,0,0,.3);
    }
    .boton-wa-mio:active { transform: scale(0.98); }

    /* Redes sociales */
    .social-links {
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      gap: 32px !important;
      margin-top: 30px !important;
      margin-bottom: 20px !important;
      flex-wrap: wrap !important;
    }
    .social-icon {
      display: inline-block !important;
      width: 40px !important;
      height: 40px !important;
      transition: transform 0.2s ease, opacity 0.2s ease !important;
      opacity: 0.85;
    }
    .social-icon:hover {
      transform: scale(1.1) !important;
      opacity: 1;
    }
    .social-icon svg {
      width: 100% !important;
      height: 100% !important;
      fill: white !important;
    }

    /* Ajustes responsivos para el logo gigante */
    @media (max-width: 768px) {
      .logo-container-mio img { height: 180px; }
    }
    @media (max-width: 600px) {
      .logo-container-mio img { height: 150px; }
    }
    @media (max-width: 480px){
      body { padding: 20px 0; }
      .mi-carrusel-wrapper { gap: 24px; }
      .logo-container-mio img { height: 130px; }
      .stage-mio { height: min(55vh, 420px); }
      .boton-wa-mio { min-width: 200px; height: 48px; line-height: 48px; font-size: 13px; }
      .social-links { gap: 26px !important; margin-top: 24px !important; }
      .social-icon { width: 34px !important; height: 34px !important; }
    }
    @media (max-width: 390px){
      .logo-container-mio img { height: 110px; }
      .stage-mio { height: min(52vh, 400px); }
      .social-links { gap: 22px !important; }
      .social-icon { width: 32px !important; height: 32px !important; }
    }
    @media (max-width: 360px){
      .logo-container-mio img { height: 90px; }
    }
  </style>
</head>
<body>
<div class="mi-carrusel-wrapper">

      <article class="card-mio"><img src="images/descarga%20%281%29.png" alt="Producto" onerror="this.onerror=null; this.src='https://picsum.photos/id/20/400/500'"></article>
      <article class="card-mio"><img src="images/descarga%20%281%29.png" alt="Producto" onerror="this.onerror=null; this.src='https://picsum.photos/id/20/400/500'"></article>
      <article class="card-mio"><img src="images/descarga%20%281%29.png" alt="Producto" onerror="this.onerror=null; this.src='https://picsum.photos/id/20/400/500'"></article>

<script>
  (function(){
    const cards = Array.from(document.querySelectorAll('.card-mio'));
    const total = cards.length;
    const carousel = document.getElementById('carouselFinal');
    let activeIndex = 0;
    let isDragging = false;
    let startX = 0;
    let dragDelta = 0;

    function getLayout(){
      const w = window.innerWidth;
      if (w <= 360) return { centerW:264, centerH:380, sideW:212, sideH:343, sideY:8, x1:144, x2:268, scale1:0.86, scale2:0.80, rot1:24, rot2:33 };
      if (w <= 390) return { centerW:278, centerH:392, sideW:220, sideH:352, sideY:8, x1:152, x2:282, scale1:0.87, scale2:0.81, rot1:23, rot2:32 };
      if (w <= 430) return { centerW:292, centerH:404, sideW:228, sideH:360, sideY:8, x1:162, x2:298, scale1:0.88, scale2:0.82, rot1:22, rot2:31 };
      return { centerW:304, centerH:413, sideW:236, sideH:372, sideY:8, x1:170, x2:316, scale1:0.89, scale2:0.83, rot1:21, rot2:30 };
    }

    function applyLayout(){
      const l = getLayout();
      cards.forEach((card, i) => {
        let dRaw = i - activeIndex;
        let d = ((dRaw % total) + total) % total;
        if (d > total/2) d -= total;
        let x=0, y=0, scale=1, rotateY=0, opacity=1, z=3;
        let w = l.centerW, h = l.centerH;
        if (d === 0) { x=0; y=0; scale=1; rotateY=0; z=5; w=l.centerW; h=l.centerH; }
        else if (d === -1) { x=-l.x1; y=l.sideY; scale=l.scale1; rotateY=l.rot1; z=3; w=l.sideW; h=l.sideH; }
        else if (d === 1) { x=l.x1; y=l.sideY; scale=l.scale1; rotateY=-l.rot1; z=3; w=l.sideW; h=l.sideH; }
        else if (d === -2) { x=-l.x2; y=l.sideY+4; scale=l.scale2; rotateY=l.rot2; z=1; w=Math.round(l.sideW*0.95); h=Math.round(l.sideH*0.95); }
        else if (d === 2) { x=l.x2; y=l.sideY+4; scale=l.scale2; rotateY=-l.rot2; z=1; w=Math.round(l.sideW*0.95); h=Math.round(l.sideH*0.95); }
        else { opacity=0; z=0; x=0; y=0; scale=0.7; rotateY=0; }
        card.style.width = w + 'px';
        card.style.height = h + 'px';
        card.style.opacity = opacity;
        card.style.zIndex = z;
        card.style.transform = `translate(-50%, -50%) translateX(${x}px) translateY(${y}px) rotateY(${rotateY}deg) scale(${scale})`;
      });
    }

    function next(){ activeIndex = (activeIndex+1)%total; applyLayout(); }
    function prev(){ activeIndex = (activeIndex-1+total)%total; applyLayout(); }

    carousel.addEventListener('pointerdown', (e) => {
      isDragging = true;
      startX = e.clientX;
      dragDelta = 0;
      carousel.setPointerCapture?.(e.pointerId);
    });
    carousel.addEventListener('pointermove', (e) => {
      if(!isDragging) return;
      dragDelta = e.clientX - startX;
    });
    carousel.addEventListener('pointerup', () => {
      if(!isDragging) return;
      isDragging = false;
      if(Math.abs(dragDelta) > 45) dragDelta < 0 ? next() : prev();
      else applyLayout();
    });
    carousel.addEventListener('pointercancel', () => { isDragging = false; applyLayout(); });
    carousel.addEventListener('pointerleave', () => { isDragging = false; applyLayout(); });
    window.addEventListener('resize', applyLayout);
    applyLayout();
  })();
</script>
</body>
