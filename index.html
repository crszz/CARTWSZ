<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Descubre nuestros productos. Síguenos en redes.">
    <title> Cartwsz </title>
    <meta property="og:locale" content="es_LA">
    <meta property="og:type" content="website">
    <meta property="og:title" content="CARTWSZ">
    <meta property="og:description" content="Dos productos increíbles para ti.">
    <meta property="og:url" content="https://tudominio.com/">
    <meta property="og:image" content="https://tudominio.com/images/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Tu Marca">
    <meta name="twitter:description" content="Dos productos increíbles para ti.">
    <meta name="twitter:image" content="https://tudominio.com/images/og-image.jpg">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕸️</text></svg>">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            margin: 0;
            overflow: hidden;
            position: fixed;
            top: 0; bottom: 0; left: 0; right: 0;
            background: black;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .loading-bar-container {
            width: 180px;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: #66cddd;
            border-radius: 3px;
            transition: width 0.08s linear;
        }
        .loading-percentage-text {
            margin-top: 16px;
            font-size: 14px;
            font-weight: 400;
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.5px;
        }

        #app-root {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .logo-center-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            padding: 0 20px;
        }
        #custom-logo {
            height: 177px;
            width: auto;
            max-width: 85vw;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
        }

        /* ── CORRECCIÓN: bajado para no chocar con el logo ── */
        .products-wrapper {
            position: absolute;
            top: 56%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 0 10px;
        }

        .products-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: nowrap;
        }

        .product-item {
            flex: 1 1 auto;
            max-width: 48%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .product-card {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.2);
        }
        .product-card:active { transform: scale(0.98); }
        .product-card img {
            width: 100%;
            height: auto;
            aspect-ratio: 3/4;
            object-fit: cover;
            display: block;
        }

        .product-label {
            font-family: "Digital-7", "DS-Digital", "Orbitron", "Share Tech Mono", monospace;
            font-size: 28px;
            font-weight: 400;
            letter-spacing: 2px;
            color: #ffffff;
            text-align: center;
            line-height: 1;
            text-shadow: 0 2px 8px rgba(0,0,0,0.65);
            user-select: none;
            margin-bottom: 2px;
        }

        .price-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }
        .old-price {
            font-family: "Digital-7", "DS-Digital", "Orbitron", "Share Tech Mono", monospace;
            font-size: 17px;
            font-weight: 300;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.45);
            text-decoration: line-through;
            text-align: center;
            line-height: 1.2;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
            user-select: none;
        }
        .new-price {
            font-family: "Digital-7", "DS-Digital", "Orbitron", "Share Tech Mono", monospace;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #66cddd;
            text-align: center;
            line-height: 1.1;
            text-shadow: 0 0 12px rgba(102,205,221,0.6), 0 2px 6px rgba(0,0,0,0.7);
            user-select: none;
            animation: priceGlow 2.5s ease-in-out infinite;
        }
        @keyframes priceGlow {
            0%, 100% { text-shadow: 0 0 12px rgba(102,205,221,0.6), 0 2px 6px rgba(0,0,0,0.7); }
            50% { text-shadow: 0 0 22px rgba(102,205,221,0.9), 0 0 35px rgba(102,205,221,0.4), 0 2px 6px rgba(0,0,0,0.7); }
        }

        .stock-info {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.8px;
            color: rgba(255,255,255,0.6);
            text-align: center;
            text-transform: uppercase;
            background: rgba(255,255,255,0.06);
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.12);
            user-select: none;
            margin-top: 2px;
        }

        .social-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 16px 20px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            z-index: 50;
        }
        .social-icon {
            display: inline-block;
            width: 36px;
            height: 36px;
            transition: transform 0.2s;
            opacity: 0.85;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        .social-icon:hover { transform: scale(1.1); opacity: 1; }
        .social-icon svg { width: 100%; height: 100%; fill: white; }

        @media (max-width: 600px) {
            .products-container { gap: 14px; width: 95vw; }
            .product-label { font-size: 22px; letter-spacing: 1.5px; }
            .old-price { font-size: 15px; }
            .new-price { font-size: 22px; letter-spacing: 1.2px; }
            .stock-info { font-size: 10px; padding: 3px 12px; }
        }
        @media (max-width: 500px) {
            #custom-logo { height: 133px; }
            .products-wrapper { top: 58%; }
            .products-container { gap: 10px; }
            .social-icon { width: 32px; height: 32px; }
            .social-bar { gap: 20px; }
            .product-label { font-size: 20px; }
            .old-price { font-size: 14px; }
            .new-price { font-size: 20px; }
            .stock-info { font-size: 9px; padding: 3px 10px; }
        }
        @media (max-width: 400px) {
            #custom-logo { height: 118px; }
            .products-wrapper { top: 60%; }
            .products-container { gap: 8px; width: 98vw; }
            .product-card { border-radius: 16px; }
            .social-icon { width: 28px; height: 28px; }
            .social-bar { gap: 16px; }
            .product-label { font-size: 18px; letter-spacing: 1px; }
            .old-price { font-size: 13px; }
            .new-price { font-size: 18px; letter-spacing: 1px; }
            .stock-info { font-size: 8px; padding: 2px 9px; }
        }
    </style>
</head>
<body>

<script>
    (function() {
        const loadingScreen = document.getElementById('loading-screen');
        const barFill = document.getElementById('loading-bar-fill');
        const percentageEl = document.getElementById('loading-percentage');
        const appRoot = document.getElementById('app-root');
        let progress = 0;

        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 6) + 1;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                barFill.style.width = '100%';
                percentageEl.textContent = '100%';
                setTimeout(() => {
                    loadingScreen.style.opacity = '0';
                    loadingScreen.style.transition = 'opacity 0.4s ease';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                        appRoot.style.display = 'block';
                    }, 400);
                }, 200);
            } else {
                barFill.style.width = progress + '%';
                percentageEl.textContent = progress + '%';
            }
        }, 80);
    })();
</script>
